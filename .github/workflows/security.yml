name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-analysis:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.13.1"

      - name: Cache node modules
        uses: actions/cache@v4
        env:
          cache-name: cache-node-modules
        with:
          path: ~/.npm
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Hardhat compile
        run: npx hardhat compile

      - name: Upload compiled artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hardhat-artifacts
          path: artifacts/

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Slither
        run: pip install slither-analyzer

    
      - name: Run Slither on basic
        run: |
          slither contracts/basic/ --json slither-basic.json || true
          code=$?
          if [ $code -eq 0 ] || [ $code -eq 1 ] || [ $code -eq 255 ]; then
            exit 0
          fi
            echo "ERROR: Slither crashed on basic contracts (exit code $code)"
          exit 2

      - name: Run Slither on advanced
        run: |
          slither contracts/advanced/ --json slither-advanced.json --solc-remaps "@openzeppelin/=node_modules/@openzeppelin/" || true
          code=$?
          if [ $code -eq 0 ] || [ $code -eq 1 ] || [ $code -eq 255 ]; then
            exit 0
          fi
            echo "ERROR: Slither crashed on advanced contracts (exit code $code)"
          exit 2

      - name: Run custom unprotected initializer detector
        run: |
          python3 slither_detectors/run_detector.py contracts/exploits/ProxyImplementation.sol || echo "Expected findings in exploit contract, continuing"
          python3 slither_detectors/run_detector.py contracts/advanced/SecureProxy.sol

      - name: Merge Slither reports
        run: |
          python3 -c "
          import json, os, sys

          results = {'results': {'detectors': []}}
          files_processed = 0

          for f in ['slither-basic.json', 'slither-advanced.json']:
              if os.path.exists(f):
                  files_processed += 1
                  with open(f) as fp:
                      data = json.load(fp)
                  detectors = data.get('results', {}).get('detectors', [])
                  results['results']['detectors'].extend(detectors)

          if files_processed == 0:
              print('ERROR: No Slither report files found — analysis may have failed entirely')
              sys.exit(1)

          with open('slither-report.json', 'w') as fp:
              json.dump(results, fp)

          print(f'Merged {files_processed} report(s) with {len(results[\"results\"][\"detectors\"])} total finding(s)')
          "

      - name: Upload JSON file
        uses: actions/upload-artifact@v4
        with:
          name: artifact
          path: slither-report.json

      - name: Check for vulnerabilities
        run: |
          python3 -c "
          import json, sys, os

          if not os.path.exists('slither-report.json'):
              print('ERROR: slither-report.json not found — Slither may have crashed')
              sys.exit(1)

          with open('slither-report.json') as f:
              report = json.load(f)

          detectors = report.get('results', {}).get('detectors', [])
          high = [d for d in detectors if d.get('impact') in ['High', 'Critical']]
          medium = [d for d in detectors if d.get('impact') == 'Medium']
          low = [d for d in detectors if d.get('impact') == 'Low']

          if medium:
              print(f'WARNING: {len(medium)} medium severity finding(s) — review before production')
              for v in medium:
                  print(f'  - {v[\"check\"]}: {v[\"description\"][:80]}')

          if low:
              print(f'INFO: {len(low)} low severity finding(s)')
              for v in low:
                  print(f'  - {v[\"check\"]}: {v[\"description\"][:80]}')

          if high:
              print(f'FAILED: {len(high)} high/critical vulnerabilities found')
              for v in high:
                  print(f'  - {v[\"check\"]}: {v[\"description\"][:80]}')
              sys.exit(1)

          print('PASSED: No high/critical severity vulnerabilities found')
          "


      - name: Configure AWS credentials
        if: always()
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-north-1


      - name: Upload reports to S3
        if: always()
        run: |
          TIMESTAMP=$(date +%Y-%m-%dT%H-%M-%S)
          RUN_ID=${{ github.run_id }}
          BRANCH=$(echo "${{ github.ref_name }}" | tr '/' '-')
          
          # Upload Slither report to S3
          if [ -f slither-report.json ]; then
            aws s3 cp slither-report.json \
              s3://devsecops-smart-contract-reports-358344803500/pipeline-runs/${BRANCH}/${RUN_ID}/${TIMESTAMP}-slither-report.json
            echo "Uploaded slither-report.json to S3"
          fi
          
          # Determine pipeline result
          STATUS=$(python3 -c "
          import json, sys
          try:
              with open('slither-report.json') as f:
                  report = json.load(f)
              detectors = report.get('results', {}).get('detectors', [])
              high = [d for d in detectors if d.get('impact') in ['High', 'Critical']]
              print('FAILED' if high else 'PASSED')
          except:
              print('FAILED')
          ")
          
          echo "Pipeline status: $STATUS"
          
          # Create log stream if it doesn't exist
          aws logs create-log-stream \
            --log-group-name /devsecops/pipeline \
            --log-stream-name security-analysis-${BRANCH} \
            --region eu-north-1 2>/dev/null || true
          
          # Push log event to CloudWatch
          TIMESTAMP_MS=$(date +%s%3N)
          aws logs put-log-events \
            --log-group-name /devsecops/pipeline \
            --log-stream-name security-analysis-${BRANCH} \
            --log-events "[{\"timestamp\":${TIMESTAMP_MS},\"message\":\"${STATUS} branch=${BRANCH} run=${RUN_ID}\"}]" \
            --region eu-north-1 || echo "CloudWatch push failed non-critically"

  deploy:
    needs: security-analysis
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.13.1"

      - name: Cache node modules
        uses: actions/cache@v4
        env:
          cache-name: cache-node-modules
        with:
          path: ~/.npm
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Download compiled artifacts
        uses: actions/download-artifact@v4
        with:
          name: hardhat-artifacts
          path: artifacts/

      - name: Deploy to Sepolia
        timeout-minutes: 10
        run: npx hardhat run scripts/deploy.js --network sepolia
        env:
          SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
          METAMASK_API: ${{ secrets.METAMASK_API }}
